<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARC161 Posture Harness – حزام ظهر شبه طبي</title>

  <style>
    :root {
      /* خلفية Gradient هادئة (أخضر+أزرق طبي) */
      --bg-top: #0f172a;
      --bg-bottom: #020617;
      --card: rgba(15, 23, 42, 0.96);
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --primary-blue: #0ea5e9;
      --text-main: #f9fafb;
      --text-soft: #cbd5f5;
      --border: rgba(148, 163, 184, 0.3);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 55%),
        radial-gradient(circle at bottom, rgba(56, 189, 248, 0.16), transparent 60%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;       /* في وسط الشاشة عموديًا */
      justify-content: center;   /* في وسط الشاشة أفقيًا */
    }

    .page {
      width: 100%;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 920px;
    }

    .card {
      background: var(--card);
      border-radius: 26px;
      padding: 22px 18px;
      border: 1px solid var(--border);
      box-shadow:
        0 32px 80px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(15, 23, 42, 0.8);
    }

    .hero {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero-media {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .hero-media img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 420px;
    }

    .hero-media-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(14, 165, 233, 0.15), transparent 55%),
        radial-gradient(circle at bottom, rgba(34, 197, 94, 0.18), transparent 60%);
      pointer-events: none;
    }

    .hero-text {
      position: relative;
      padding: 4px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: #9ca3af;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--primary-blue);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.9);
    }

    .handle {
      opacity: 0.9;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(15, 118, 110, 0.22);
      color: #a5f3fc;
      border: 1px solid rgba(34, 211, 238, 0.5);
    }

    .badge span.dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .subhead {
      font-size: 14px;
      color: var(--text-soft);
      margin: 0 0 10px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .price {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
    }

    .old-price {
      font-size: 13px;
      color: #9ca3af;
      text-decoration: line-through;
    }

    .info-line {
      font-size: 12px;
      color: #9ca3af;
    }

    .cta-main {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-primary {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: 100%;
      border-radius: 999px;
      padding: 12px 16px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #020617;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      box-shadow:
        0 18px 40px rgba(34, 197, 94, 0.58),
        0 0 0 1px rgba(34, 197, 94, 0.5);
      letter-spacing: 0.02em;
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 8px 18px rgba(34, 197, 94, 0.45);
    }

    .btn-secondary-text {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

      padding
